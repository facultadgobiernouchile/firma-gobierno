<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firma de correos – Facultad de Gobierno</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="margin:0;background:#eef1f7;">


<style>
  #firma-app *, #firma-app *::before, #firma-app *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #firma-app {
    font-family: "Cairo", sans-serif;
    background: #eef1f7;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 0.75rem;
    width: 100%;
  }

  #firma-app .fw-header { text-align: center; margin-bottom: 1.5rem; }
  #firma-app .fw-header h2 { font-size: 1.35rem; font-weight: 700; color: #1a2e6b; line-height: 1.2; }
  #firma-app .fw-header p  { font-size: 0.82rem; color: #6a7a9a; margin-top: 0.25rem; }

  #firma-app .fw-card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 28px rgba(26,46,107,0.10);
    padding: 1.5rem 1.25rem 1.4rem;
    width: 100%;
    max-width: 720px;
  }

  #firma-app .fw-section-title {
    font-size: 0.70rem; font-weight: 700; color: #1a2e6b;
    text-transform: uppercase; letter-spacing: 0.09em;
    margin-bottom: 0.9rem; padding-bottom: 0.4rem;
    border-bottom: 1.5px solid #e2e8f4;
  }

  #firma-app .fw-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem 1.2rem;
    margin-bottom: 1.4rem;
  }

  @media (max-width: 520px) {
    #firma-app .fw-grid { grid-template-columns: 1fr; gap: 0.75rem; }
    #firma-app { padding: 1rem 0.6rem; }
    #firma-app .fw-card { padding: 1.2rem 1rem 1.2rem; border-radius: 12px; }
    #firma-app .fw-header h2 { font-size: 1.15rem; }
  }

  #firma-app .fw-group { display: flex; flex-direction: column; gap: 0.25rem; }

  #firma-app label {
    font-size: 0.70rem; font-weight: 700; color: #3a4e7a;
    text-transform: uppercase; letter-spacing: 0.07em;
  }
  #firma-app label .req { color: #d63a2a; margin-left: 2px; }

  #firma-app input[type="text"] {
    font-family: "Cairo", sans-serif; font-size: 0.93rem;
    padding: 0.5rem 0.75rem;
    border: 1.5px solid #cdd5e8;
    border-radius: 8px; color: #1a2e6b; background: #f7f9fc;
    outline: none; transition: border-color 0.18s;
    width: 100%;
  }
  #firma-app input[type="text"]:focus { border-color: #1a2e6b; background: #fff; }

  #firma-app .fw-anexo { display: flex; align-items: stretch; }
  #firma-app .fw-prefix {
    font-family: "Cairo", sans-serif; font-size: 0.93rem;
    padding: 0.5rem 0.7rem; background: #e2e8f4;
    border: 1.5px solid #cdd5e8; border-right: none;
    border-radius: 8px 0 0 8px; color: #1a2e6b; font-weight: 700;
    white-space: nowrap; display: flex; align-items: center;
  }
  #firma-app .fw-anexo input { border-radius: 0 8px 8px 0; min-width: 0; flex: 1; }

  #firma-app .fw-hint { font-size: 0.70rem; color: #8a9ab8; margin-top: 0.2rem; }

  #firma-app .fw-preview-label {
    font-size: 0.70rem; font-weight: 700; color: #1a2e6b;
    text-transform: uppercase; letter-spacing: 0.09em;
    margin-bottom: 0.7rem; padding-bottom: 0.4rem;
    border-bottom: 1.5px solid #e2e8f4;
  }

  #firma-app .fw-preview-wrap {
    background: #f7f9fc;
    border: 1.5px dashed #cdd5e8;
    border-radius: 10px;
    padding: 0.75rem;
    margin-bottom: 1.25rem;
    overflow: hidden;
  }

  #fw-canvas {
    display: block;
    width: 100%;
    height: auto;
  }

  #firma-app .fw-btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    justify-content: flex-end;
    align-items: center;
  }

  #firma-app .fw-error {
    font-size: 0.78rem; color: #d63a2a;
    margin-right: auto; display: none;
    flex-basis: 100%;
  }

  @media (min-width: 400px) {
    #firma-app .fw-error { flex-basis: auto; }
  }

  #firma-app .fw-btn {
    font-family: "Cairo", sans-serif;
    font-size: 0.86rem; font-weight: 600;
    padding: 0.55rem 1.25rem;
    border-radius: 8px; border: none; cursor: pointer;
    white-space: nowrap;
  }
  #firma-app .fw-btn-primary { background: #1a2e6b; color: #fff; }
  #firma-app .fw-btn-primary:hover { background: #12235a; }
  #firma-app .fw-btn-secondary { background: #e2e8f4; color: #1a2e6b; }

  @media (max-width: 360px) {
    #firma-app .fw-btn { font-size: 0.80rem; padding: 0.5rem 0.9rem; }
  }
</style>

<div id="firma-app">
  <div class="fw-header">
    <h2>Firma de correos</h2>
    <p>Facultad de Gobierno · Universidad de Chile</p>
  </div>

  <div class="fw-card">
    <div class="fw-section-title">Datos de la firma</div>
    <div class="fw-grid">
      <div class="fw-group">
        <label for="fw-nombre">Nombre completo <span class="req">*</span></label>
        <input type="text" id="fw-nombre" placeholder="Nombre">
      </div>
      <div class="fw-group">
        <label for="fw-cargo">Cargo <span class="req">*</span></label>
        <input type="text" id="fw-cargo" placeholder="Cargo">
      </div>
      <div class="fw-group">
        <label>Solo Anexo</label>
        <div class="fw-anexo">
          <span class="fw-prefix">2297</span>
          <input type="text" id="fw-anexo" placeholder="XXXXX" maxlength="5">
        </div>
        <span class="fw-hint">El prefijo 2297 se agrega automáticamente.</span>
      </div>
    </div>

    <div class="fw-preview-label">Vista previa</div>
    <div class="fw-preview-wrap">
      <canvas id="fw-canvas"></canvas>
    </div>

    <div class="fw-btn-row">
      <span class="fw-error" id="fw-error">Nombre y Cargo son obligatorios.</span>
      <button class="fw-btn fw-btn-secondary" onclick="fwLimpiar()">Limpiar</button>
      <button class="fw-btn fw-btn-primary" onclick="fwDescargar()">&#11015; Descargar firma</button>
    </div>
  </div>
</div>

  function fwDraw(cvs, nombre, cargo, anexo) {
    var ctx = cvs.getContext('2d');
    ctx.clearRect(0, 0, cvs.width, cvs.height);

    var scaleY = cvs.height / FH;

    ctx.lineWidth = 1;

    ctx.lineTo(DIVIDER_X, (FH + 180) / 2);
    ctx.stroke();

    var hasPhone = anexo.length > 0;
    var totalH = NAME_SIZE + LINE_GAP

               + (hasPhone ? INFO_SIZE + LINE_GAP : 0)
               + INFO_SIZE + LINE_GAP
               + INFO_SIZE;

    var y = Math.round((FH - totalH) / 2);
    ctx.fillStyle = COLOR;
    ctx.textBaseline = 'top';

    ctx.font = '400 ' + NAME_SIZE + 'px Cairo, sans-serif';
    ctx.fillText(nombre || 'Nombre', TEXT_X, y);
    y += NAME_SIZE + LINE_GAP;

    ctx.font = '400 ' + CARGO_SIZE + 'px Cairo, sans-serif';
    ctx.fillText(cargo || 'Cargo', TEXT_X, y);
    y += CARGO_SIZE + LINE_GAP * 2;

    if (hasPhone) {
      ctx.font = '400 ' + INFO_SIZE + 'px Cairo, sans-serif';
      ctx.fillText('2297' + anexo, TEXT_X, y);
      y += INFO_SIZE + LINE_GAP;
    }

    ctx.font = '400 ' + INFO_SIZE + 'px Cairo, sans-serif';
    ctx.fillText('Complejo VM20 - Ramón Carnicer N° 15, Providencia, Santiago, Chile.', TEXT_X, y);
    y += INFO_SIZE + LINE_GAP;

    ctx.font = '700 ' + INFO_SIZE + 'px Cairo, sans-serif';
    ctx.fillText('www.gobierno.uchile.cl', TEXT_X, y);

    ctx.restore();
  }

  function fwGetVals() {
    return {
      n: document.getElementById('fw-nombre').value.trim(),
      c: document.getElementById('fw-cargo').value.trim(),
      a: document.getElementById('fw-anexo').value.trim()
    };
  }

  function fwUpdate() {
    var v = fwGetVals();
    fwDraw(canvas, v.n || 'Nombre', v.c || 'Cargo', v.a);
  }

  logoImg.onload = fwUpdate;
  document.fonts.ready.then(fwUpdate);
  fwUpdate();
  setTimeout(fwUpdate, 500);
  setTimeout(fwUpdate, 1500);

  document.getElementById('fw-nombre').addEventListener('input', fwUpdate);
  document.getElementById('fw-cargo').addEventListener('input', fwUpdate);
  document.getElementById('fw-anexo').addEventListener('input', fwUpdate);

  window.fwLimpiar = function() {
    document.getElementById('fw-nombre').value = '';
    document.getElementById('fw-cargo').value = '';
    document.getElementById('fw-anexo').value = '';
    document.getElementById('fw-error').style.display = 'none';
    fwUpdate();
  };

  window.fwDescargar = function() {
    var v = fwGetVals();
    if (!v.n || !v.c) {
      document.getElementById('fw-error').style.display = 'inline';
      return;
    }
    document.getElementById('fw-error').style.display = 'none';
    // Canvas de descarga en tamaño real 760x269
    var off = document.createElement('canvas');
    off.width  = FW;
    off.height = FH;
    fwDraw(off, v.n, v.c, v.a);
    var link = document.createElement('a');
    link.download = 'Firma_' + v.n.replace(/\s+/g, '_') + '.png';
    link.href = off.toDataURL('image/png');
    link.click();
  };
})();
</script>

</body>
